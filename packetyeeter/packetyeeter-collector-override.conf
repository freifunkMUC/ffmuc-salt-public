[Service]
# Overrides the officially packaged ExecStart, which (as of v0.1.0) uses
# bash-only ${VAR:-default} / ${VAR:+...} expansion. Native systemd does NOT
# support that syntax (no shell is involved) and fails with INVALIDARGUMENT
# even when the referenced variable is set - see upstream packaging bug.
#
# EXTRA_ARGS can contain multiple space-separated flags (e.g.
# "-dry-run -allowlist 1.2.3.0/24,..."). Systemd's own ${VAR} substitution
# does NOT perform shell word-splitting - it passes the whole value as a
# single argv token, which the Go flag parser then rejects with
# "flag provided but not defined". Routing ExecStart through /bin/sh lets
# $EXTRA_ARGS undergo real shell word-splitting into separate arguments,
# while other single-value vars are double-quoted to prevent any unwanted
# splitting/globbing on their own values.
ExecStart=
ExecStart=/bin/sh -c 'exec /opt/packetyeeter/collector/packetyeeter-collector -i "$INTERFACE" -analyzer-addr "$ANALYZER_ADDR" -metrics-addr "$METRICS_ADDR" -haproxy-port "$HAPROXY_PORT" -spoe-port "$SPOE_PORT" -socket "$SOCKET_PATH" -geoip-asn "$GEOIP_ASN_PATH" -block-duration "$BLOCK_DURATION" $EXTRA_ARGS'

